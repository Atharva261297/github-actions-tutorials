name: GitHub Secrets Demo
on:
  push:
    branches:
      - main
jobs:
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secret exists
        run: |
          if [ -z "${{ secrets.MY_SECRET }}" ]; then
            echo "❌ MY_SECRET is missing"
            exit 1
          else
            echo "✅ MY_SECRET is set"
          fi
      - name: Use secret safely
        run: |
          echo "Using secret..."
          echo "::add-mask::${{ secrets.MY_SECRET }}"
          echo "Secret value is masked in logs"
